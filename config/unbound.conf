server:
    interface: 127.0.0.1
    port: 5335
    do-ip4: yes
    do-udp: yes
    do-tcp: yes

    # Security: Only allow the local VM network
    access-control: 127.0.0.0/8 allow
    access-control: 10.0.0.0/8 allow

    # Performance & Aggressive Caching
    prefetch: yes
    prefetch-key: yes
    serve-expired: yes
    msg-cache-size: 128m
    rrset-cache-size: 256m

    # Privacy
    hide-identity: yes
    hide-version: yes
    qname-minimisation: yes